function isWeChat() {
  return /micromessenger/i.test(navigator.userAgent);

/* IMAGE ZOOM + DRAG */
function previewImage(src) {
  let overlay = document.createElement("div");
  overlay.style.position = "fixed";
  overlay.style.top = 0;
  overlay.style.left = 0;
  overlay.style.width = "100%";
  overlay.style.height = "100%";
  overlay.style.background = "rgba(0,0,0,0.9)";
  overlay.style.display = "flex";
  overlay.style.alignItems = "center";
  overlay.style.justifyContent = "center";
  overlay.style.zIndex = 9999;
  overlay.style.overflow = "hidden";
  overlay.style.touchAction = "none";

  let img = document.createElement("img");
  img.src = src;
  img.style.maxWidth = "90%";
  img.style.maxHeight = "90%";
  img.style.transformOrigin = "center";

  let scale = 1;
  let posX = 0, posY = 0;
  let startX = 0, startY = 0;
  let startDist = 0;

  function update() {
    img.style.transform = `translate(${posX}px,${posY}px) scale(${scale})`;
  }

  function dist(t) {
    let dx = t[0].clientX - t[1].clientX;
    let dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }

  overlay.addEventListener("touchstart", e => {
    if (e.touches.length === 2) {
      startDist = dist(e.touches);
    } else {
      startX = e.touches[0].clientX - posX;
      startY = e.touches[0].clientY - posY;
    }
  });

  overlay.addEventListener("touchmove", e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      let d = dist(e.touches);
      scale *= d / startDist;
      scale = Math.max(1, Math.min(scale, 4));
      startDist = d;
    } else if (scale > 1) {
      posX = e.touches[0].clientX - startX;
      posY = e.touches[0].clientY - startY;
    }
    update();
  });

  overlay.onclick = () => overlay.remove();

  overlay.appendChild(img);
  document.body.appendChild(overlay);
}

/* CODE CHECK */
let attempts = parseInt(localStorage.getItem("attempts")) || 0;
let blockedUntil = parseInt(localStorage.getItem("blockedUntil")) || 0;

function isValidMonth(codeMonth) {
  const now = new Date();
  const currentMonth = now.getMonth() + 1;

  for (let i = 0; i <= 4; i++) {
    let m = currentMonth - i;
    if (m <= 0) m += 12;
    if (String(m).padStart(2, "0") === codeMonth) return true;
  }
  return false;
}

function isValidCode(code) {
  code = code.trim().toUpperCase();
  const match = code.match(/^([A-Z0-9])([0-9]{2})Y([A-Z0-9]{2})([A-Z0-9])5$/);
  if (!match) return false;
  return isValidMonth(match[2]);
}

function grantAccess(code) {
  document.getElementById("login").style.display = "none";
  document.getElementById("content").style.display = "block";
  renderPoints();

  if (isWeChat()) {
    document.getElementById("autoBlock").style.display = "none";
  }

  const thanks = document.createElement("div");
  thanks.style.marginTop = "40px";
  thanks.style.padding = "15px";
  thanks.style.fontSize = "15px";
  thanks.style.lineHeight = "1.8";
  thanks.style.color = "#333";
  thanks.style.borderTop = "1px solid #eee";
  thanks.style.textAlign = "left";

  thanks.innerHTML = `
    🙏✨ <b>感谢您的收听</b> 🎧<br>
    🌍 希望本次音频导览让您的旅程更加有趣与丰富<br>
    📝 如果方便的话，欢迎您留下真实的评价<br>
    💬 这对我们非常重要，非常感谢您的支持 ❤️
  `;

  document.getElementById("content").appendChild(thanks);
}

function checkCode() {
  const now = Date.now();
  const msg = document.getElementById("msg");

  if (now < blockedUntil) {
    msg.innerText = "请稍后再试";
    return;
  }

  let code = document.getElementById("code").value.trim().toUpperCase();

  if (!isValidCode(code)) {
    attempts++;
    localStorage.setItem("attempts", attempts);

    if (attempts >= 3) {
      blockedUntil = Date.now() + 60000;
      localStorage.setItem("blockedUntil", blockedUntil);
      attempts = 0;
      localStorage.setItem("attempts", 0);
      msg.innerText = "尝试次数过多，请60秒后再试";
      return;
    }

    msg.innerText = "代码无效";
    return;
  }

  attempts = 0;
  localStorage.setItem("attempts", 0);

  grantAccess(code);
}

/* RENDER (FIXED SPACING) */
function renderPoints() {
  const container = document.getElementById("points");
  container.innerHTML = "";

  pointsData.forEach((p,i)=>{
    const div = document.createElement("div");
div.className = "audio-block";
    div.style.marginBottom = "35px";
    div.style.textAlign = "left";

    let html = `
     <div style="margin-bottom:4px;">📍 第${i+1}站</div>

      <div style="font-weight:bold;color:#1677ff;margin-bottom:8px;">
        ${p.text}
      </div>

      <div style="line-height:1.7;margin-bottom:12px;">
        ${p.description}
      </div>

      <audio controls style="width:100%;margin-bottom:12px;">
        <source src="${p.audio}">
      </audio>
    `;

    p.images.forEach(img=>{
      html += `<img src="${img}" onclick="previewImage('${img}')"
        style="width:100%;margin:8px 0;border-radius:8px;">`;
    });

    div.innerHTML = html;
    container.appendChild(div);
  });
}

/* autoplay */
function playAll() {
  const audios = document.querySelectorAll("audio");
  let i = 0;
  function next() {
    if (i >= audios.length) return;
    audios[i].play();
    audios[i].onended = () => { i++; next(); };
  }
  next();
}

/* init */
window.onload = function() {
  const params = new URLSearchParams(location.search);
  const code = params.get("code");
  if (code) document.getElementById("code").value = code;
};

 document.addEventListener("play", function(e) {
  const audios = document.querySelectorAll("audio");

  audios.forEach(a => {
    if (a !== e.target) {
      a.pause();
    }
  });

  // подсветка
  document.querySelectorAll(".audio-block").forEach(block => {
    block.classList.remove("active-audio");
  });

  const currentBlock = e.target.closest(".audio-block");
  if (currentBlock) {
    currentBlock.classList.add("active-audio");
  }

}, true);
